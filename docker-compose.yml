services:
  mc:
    image: itzg/minecraft-server
    container_name: "mc-server"
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    env_file:
      - .env
    environment:
      EULA: "TRUE"
      MOTD: "Blueprint Minecraft Server on 1.21.10"
      VERSION: 1.21.10
      ICON: /icon.png
      MAX_MEMORY: 4G
    volumes:
      - ./data:/data
      - ./icon.png:/icon.png

  backup:
    image: itzg/mc-backup
    container_name: "mc-backup"
    restart: unless-stopped
    depends_on:
      mc:
        condition: service_healthy
    environment:
      BACKUP_INTERVAL: "1d"
      BACKUP_METHOD: rclone
      RCON_HOST: mc
      RCLONE_REMOTE: remote
      RCLONE_COMPRESS_METHOD: gzip
      DEST_DIR: /backup
      RCLONE_DEST_DIR: /mc-backups
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - rclone-config:/config/rclone

volumes:
  rclone-config:
    external: true
