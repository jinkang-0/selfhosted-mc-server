services:
  mc:
    image: itzg/minecraft-server
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    env_file:
      - .env
    environment:
      EULA: "TRUE"
      MOTD: "Blueprint Minecraft Server on 1.21.10"
      ICON: /icon.png
      MAX_MEMORY: 4G
    volumes:
      - ./data:/data
      - ./icon.png:/icon.png

  backup:
    image: itzg/mc-backup
    restart: unless-stopped
    depends_on:
      mc:
        condition: service_healthy
    environment:
      BACKUP_INTERVAL: "1d"
      BACKUP_METHOD: tar
      RCON_HOST: mc
      POST_BACKUP_SCRIPT_FILE: /post-backup.sh
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - ./post-backup.sh:/post-backup.sh:ro
